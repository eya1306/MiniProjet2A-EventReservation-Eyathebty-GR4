# Please see the following page for more information: https://webauthn-doc.spomky-labs.com/the-webauthn-server/the-symfony-way#configuration

webauthn:
    credential_repository: App\Repository\WebauthnCredentialRepository
    user_repository: App\Repository\UserRepository
    allowed_origins: ['localhost', 'http://localhost', 'http://localhost:8080']

    creation_profiles:
        default:
            rp:
                name: '%env(WEBAUTHN_RP_NAME)%'
                id: '%env(APP_DOMAIN)%'
            challenge_length: 32
            timeout: 60000
            authenticator_selection_criteria:
                user_verification: preferred
                resident_key: preferred
            attestation_conveyance: none

    request_profiles:
        default:
            rp_id: '%env(APP_DOMAIN)%'
            challenge_length: 32
            timeout: 60000
            user_verification: preferred
